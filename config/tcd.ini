# Transcoder Ini file

Port = 10100
ServerAddress = 127.0.0.1

# Must match the transcoded modules in urfd.ini [Transcoder] section.
# Single module for DVSI-3000, up to three modules for DVSI-3003.
Modules = S

# FTDI serial number(s) of the AMBE device(s).
# Use 'tcd --list-devices' to discover connected FTDI devices and their serials.
# DeviceSerial = DQ015SBR

# Gain values in dB (-24 to +24).
# With AGC enabled, these only need coarse codec-level matching.
# Without AGC, these must compensate for all level differences.
#
# Example without AGC:
# DStarGainIn   =  16
# DStarGainOut  = -16
# DmrYsfGainIn  = -6
# DmrYsfGainOut = -6
# UsrpTxGain    = -8
# UsrpRxGain    = -16
#
# Example with AGC:
DStarGainIn   =  8
DStarGainOut  = -8
DmrYsfGainIn  =  0
DmrYsfGainOut =  0
UsrpTxGain    =  0
UsrpRxGain    = -8

# AGC (Automatic Gain Control)
# Normalizes audio level after decode, before encode.
# Pipeline: Source -> [GainIn] -> PCM -> [AGC] -> normalized PCM -> [GainOut] -> Target
# AGC        = true or false (default: false)
# AGCTarget  = target RMS level in dBFS (default: -16)
# AGCAttack  = attack time in ms, how fast loud signals are dampened (default: 50)
# AGCRelease = release time in ms, how fast quiet signals are raised (default: 500)
# AGCMaxGain = maximum gain boost in dB, limits noise amplification (default: 12)
AGC           = true
AGCTarget     = -16
AGCAttack     = 50
AGCRelease    = 500
AGCMaxGain    = 12
