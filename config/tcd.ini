# Transcoder Ini file

Port = 10100
ServerAddress = 127.0.0.1

# Must match the transcoded modules in urfd.ini [Transcoder] section.
# 1 module with single DVSI device, 2 modules with DV3000+DV3003 mixed mode.
Modules = FS

# FTDI serial number(s) of the AMBE device(s).
# Use 'tcd --list-devices' to discover connected FTDI devices and their serials.
# For mixed mode (DV3000 + DV3003), list both serials. Order does not matter.
# DeviceSerial = DQ015SBR
# DeviceSerial = DKB7FXGE

# Output Gain (post-AGC, before encoding) — per target codec, in dB (-40 to +40)
# Use to balance level differences between output codecs.
# Example: DMR/YSF output is often too loud, set OutputGainDMR = -10 to -16.
OutputGainDStar = 0
OutputGainM17   = 0
OutputGainDMR   = 0
OutputGainIMBE  = 0
OutputGainUSRP  = 0

# DVSI Hardware Gains in dB (-40 to +40)
# Applied inside the DVSI chip at decode/encode time.
# With AGC enabled, these should normally be 0.
DStarGainIn     = 0
DStarGainOut    = 0
DmrGainIn       = 0
DmrGainOut      = 0

# USRP/SVX PCM gains in dB (-40 to +40)
# Note: SVX gain is configured in urfd.ini (RxGain/TxGain), not here.
UsrpGainIn      = 0
UsrpGainOut     = 0

# DMR software re-encode gain (dB, -40 to +40)
# Applied before md380 re-encodes DMR output. Normally 0 (use OutputGainDMR instead).
# Only effective when built with md380=true.
DmrReencodeGain = 0

# DMR/YSF Re-encode toggle (true/false, default true)
# Requires build with md380=true — ignored with a warning otherwise.
# When true and AGC/OutputGainDMR is active, DMR/YSF output is re-encoded via md380
# to apply normalized audio. This is the primary purpose of re-encode: without it,
# DMR/YSF→DMR/YSF listeners hear un-normalized levels. When false, original AMBE
# passes through (AGC still applies to cross-mode paths like DMR→DStar, DMR→M17).
DMRReEncode     = true

# AGC (Automatic Gain Control)
# Normalizes audio level after decode, before output gains and encoding.
# Pipeline: Source -> [DVSI GainIn] -> PCM -> [AGC] -> [OutputGain] -> Encoder
AGC             = true
AGCTarget       = -16          # target RMS level in dBFS
AGCAttack       = 50           # attack time in ms
AGCRelease      = 500          # release time in ms
AGCMaxGainUp    = 30           # max amplification in dB
AGCMaxGainDown  = 24           # max attenuation in dB
AGCNoiseGate    = -55          # noise gate threshold in dBFS

# Web Dashboard & Monitoring
Monitor          = true
MonitorHttpPort  = 8080        # web dashboard (http://<host>:8080)
MonitorStatsPort = 8081        # plain TCP stats socket (for tcdmon)

# Stats CSV Logging (per-stream AGC analysis)
# Enable temporarily for tuning, disable in normal operation.
StatsLog       = false
StatsLogDir    = /tmp/tcd-stats
StatsLogRetain = 24            # hours before auto-cleanup
