# Transcoder Ini file

Port = 10100
ServerAddress = 127.0.0.1

# Must match the transcoded modules in urfd.ini [Transcoder] section.
# Single module for DVSI-3000, up to three modules for DVSI-3003.
Modules = S

# FTDI serial number(s) of the AMBE device(s).
# Use 'tcd --list-devices' to discover connected FTDI devices and their serials.
# If not set, tcd will try to auto-detect AMBE devices by description.
# DeviceSerial = DQ015SBR

# All gain values are in dB (-24 to +24).
DStarGainIn   =  16
DStarGainOut  = -16
DmrYsfGainIn  =  -3
DmrYsfGainOut =   0
UsrpTxGain    =  12
UsrpRxGain    =  -6
