# Transcoder Ini file

Port = 10100
ServerAddress = 127.0.0.1

# Must match the transcoded modules in urfd.ini [Transcoder] section.
# 1 module with single DVSI device, 2 modules with DV3000+DV3003 mixed mode.
Modules = FS

# FTDI serial number(s) of the AMBE device(s).
# Use 'tcd --list-devices' to discover connected FTDI devices and their serials.
# For mixed mode (DV3000 + DV3003), list both serials. Order does not matter.
# DeviceSerial = DQ015SBR
# DeviceSerial = DKB7FXGE

# Static gain values in dB (-24 to +24).
# With AGC enabled, all gains should be 0 — the AGC handles level normalization.
DStarGainIn     = 0
DStarGainOut    = 0
DmrYsfGainIn    = 0
DmrYsfGainOut   = 0
UsrpTxGain      = 0
UsrpRxGain      = 0

# DMR re-encode gain (dB). Adjusts PCM level before md380 re-encodes DMR output.
# Affects DMR/YSF output levels. Use negative values to reduce loud DMR on YSF.
# Set to 0 to disable re-encode (passthrough, saves CPU).
DmrReencodeGain = -10

# AGC (Automatic Gain Control)
# Normalizes audio level after decode, before encode.
# Pipeline: Source -> [GainIn] -> PCM -> [AGC] -> normalized PCM -> [GainOut] -> Target
AGC        = true
AGCTarget  = -16
AGCAttack  = 50
AGCRelease = 500
AGCMaxGain = 12
