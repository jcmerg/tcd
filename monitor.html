<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCD Monitor</title>
<style>
:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-tertiary: #0f3460;
  --accent: #0f3460;
  --highlight: #e94560;
  --text-primary: #e0e0e0;
  --text-secondary: #a0a0b8;
  --text-muted: #7a7a8e;
  --link-color: #4fc3f7;
  --link-hover: #81d4fa;
  --border-color: #2a2a4a;
  --success: #66bb6a;
  --warning: #ffa726;
  --danger: #ef5350;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background-color: var(--bg-primary);
  color: var(--text-primary);
  padding: 16px 20px;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
a { color: var(--link-color); text-decoration: none; }
a:hover { color: var(--link-hover); }

/* Top header */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 10px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border-color);
}
.page-header h1 {
  color: var(--text-primary);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

/* Section pattern (mirrors URFD admin's .admin-section) */
.section { margin-bottom: 24px; }
.section > h2 {
  color: var(--text-primary);
  font-size: 15px;
  font-weight: 500;
  padding-bottom: 8px;
  margin-bottom: 12px;
  border-bottom: 1px solid #555;
}
h3.sub {
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 14px 0 6px;
}

/* Two-column grid for module cards & config */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 800px) {
  .grid { grid-template-columns: 1fr; }
  .flow { overflow-x: visible; }
  .flow-row { flex-wrap: wrap; }
  .config-row label { width: 100px; font-size: 12px; }
  .config-row input[type=range] { max-width: 150px; }
  .agc-info { flex-wrap: wrap; }
}

/* Flat module panels (no roundings, no shadows) */
.panel {
  background-color: var(--bg-secondary);
  border: 1px solid var(--border-color);
  padding: 10px 12px;
  min-width: 0;
}
.panel.active { border-color: var(--link-color); }
.module-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-color);
}
.module-letter {
  font-size: 16px;
  font-weight: 600;
  color: var(--link-color);
}
.codec-badge {
  background-color: var(--bg-tertiary);
  padding: 1px 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--link-hover);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid var(--border-color);
}
.codec-badge.none { opacity: 0.3; }

/* "Well" form container (URFD pattern) */
.well {
  background-color: var(--bg-secondary);
  border: 1px solid var(--border-color);
  padding: 12px 14px;
  margin-bottom: 12px;
}

/* VU Meters */
.vu-row { display: flex; align-items: center; gap: 8px; margin: 3px 0; font-size: 12px; }
.vu-label { flex: 0 0 60px; text-align: right; color: var(--text-secondary); white-space: nowrap; }
.vu-bar-bg {
  flex: 1;
  height: 12px;
  background-color: var(--bg-primary);
  border: 1px solid var(--border-color);
  position: relative;
  overflow: hidden;
  min-width: 0;
}
.vu-bar { height: 100%; transition: width 0.15s ease-out; min-width: 1px; }
.vu-bar.green { background: linear-gradient(90deg, #2e7d32, var(--success)); }
.vu-bar.yellow { background: linear-gradient(90deg, #f9a825, var(--warning)); }
.vu-bar.red { background: linear-gradient(90deg, #c62828, var(--danger)); }
.vu-peak { position: absolute; top: 0; height: 100%; width: 2px; background: #fff; opacity: 0.7; }
.vu-val {
  flex: 0 0 58px;
  font-size: 11px;
  color: var(--text-secondary);
  text-align: right;
  white-space: nowrap;
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
}

/* Signal flow diagram (kept compact, no roundings) */
.flow {
  margin: 6px 0;
  padding: 6px 8px;
  background-color: var(--bg-primary);
  border: 1px solid var(--border-color);
  font-size: 12px;
  min-width: 0;
  overflow-x: auto;
  font-family: var(--mono);
}
.flow-row { display: flex; align-items: center; gap: 4px; margin: 2px 0; }
.flow-node {
  padding: 1px 6px;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  font-weight: 500;
  border: 1px solid var(--border-color);
}
.flow-src  { color: var(--success);   background-color: rgba(102, 187, 106, 0.08); }
.flow-gain { color: #ce93d8;          background-color: rgba(186, 104, 200, 0.08); }
.flow-agc  { color: var(--warning);   background-color: rgba(255, 167, 38, 0.08); min-width: 100px; }
.flow-pcm  { color: var(--link-color); background-color: rgba(79, 195, 247, 0.07); flex: 0 0 90px; overflow: hidden; }
.flow-dst  { color: var(--danger);    background-color: rgba(239, 83, 80, 0.08); }
.flow-arrow { color: var(--text-muted); flex-shrink: 0; }
.flow-level { color: var(--warning); font-weight: 600; }

/* AGC inline display */
.agc-info {
  display: flex;
  gap: 16px;
  font-size: 12px;
  margin-top: 4px;
  white-space: nowrap;
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
}
.agc-item { color: var(--text-secondary); }
.agc-item span { color: var(--warning); font-weight: 600; }

/* Tables — URFD .table .table-striped .table-condensed */
table.tcd {
  width: 100%;
  border-collapse: collapse;
  background-color: var(--bg-secondary);
  border: 1px solid var(--border-color);
  font-size: 13px;
}
table.tcd thead th {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 6px 10px;
  border-bottom: 2px solid var(--accent);
  background-color: var(--bg-tertiary);
  white-space: nowrap;
}
table.tcd tbody td {
  padding: 5px 10px;
  vertical-align: middle;
  border-top: 1px solid var(--border-color);
}
table.tcd tbody tr:nth-of-type(odd)  td { background-color: rgba(15, 52, 96, 0.18); }
table.tcd td.num,
table.tcd th.num {
  text-align: right;
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
}
table.tcd td.center, table.tcd th.center { text-align: center; }
table.tcd td.muted { color: var(--text-muted); font-family: var(--mono); font-size: 11px; }

/* Status dots used inside table cells */
.dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; vertical-align: middle; margin-right: 4px; }
.dot.online  { background-color: var(--success); }
.dot.active  { background-color: var(--link-color); box-shadow: 0 0 6px var(--link-color); }
.dot.offline { background-color: var(--danger); }
.dot.ok      { background-color: var(--success); }
.dot.err     { background-color: var(--danger); }

.serial   { font-weight: 600; color: var(--text-primary); font-family: var(--mono); }
.mod-tag  { color: var(--link-color); font-weight: 600; font-family: var(--mono); }
.err-tag  { color: var(--danger); font-weight: 600; }

/* Config sliders */
.config-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; font-size: 13px; }
.config-row label { width: 140px; color: var(--text-secondary); }
.config-row input[type=range] { flex: 1; max-width: 200px; accent-color: var(--link-color); }
.config-row .val {
  width: 50px;
  color: var(--link-color);
  text-align: right;
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
}
.config-row input[type=checkbox] { accent-color: var(--link-color); }

select, input[type=text], input[type=number], input[type=password] {
  background-color: var(--bg-primary);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
  padding: 4px 8px;
  font-family: inherit;
  font-size: 13px;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
select:focus, input:focus {
  outline: none;
  border-color: var(--link-color);
  box-shadow: 0 0 0 2px rgba(79, 195, 247, 0.15);
}

/* Buttons — URFD admin uses Bootstrap btn-default/primary/sm */
.btn {
  background-color: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 5px 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s ease;
}
.btn:hover {
  background-color: #194a7a;
  border-color: var(--link-color);
  color: #fff;
}
.btn-sm { padding: 3px 10px; font-size: 12px; }

/* Connection status — flat label, URFD-style */
.conn {
  font-size: 11px;
  padding: 3px 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid transparent;
}
.conn.ok  { background-color: rgba(102, 187, 106, 0.15); color: var(--success); border-color: rgba(102, 187, 106, 0.4); }
.conn.err { background-color: rgba(239, 83, 80, 0.15);   color: var(--danger);  border-color: rgba(239, 83, 80, 0.4); }

.save-status { margin-left: 8px; font-size: 12px; color: var(--text-muted); }
.empty       { color: var(--text-muted); font-size: 13px; padding: 8px 0; }

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  padding-top: 12px;
  border-top: 1px solid var(--border-color);
}
</style>
</head>
<body>
<div class="page-header">
  <h1>TCD Transcoder Monitor</h1>
  <span class="conn" id="conn">connecting...</span>
</div>

<div class="section">
  <h2>Modules</h2>
  <div id="modules"></div>
</div>

<div class="section">
  <h2>DVSI Devices</h2>
  <div id="devices"><div class="empty">loading&hellip;</div></div>
</div>

<div class="section">
  <h2>Reflector</h2>
  <div id="reflector"><div class="empty">loading&hellip;</div></div>
</div>

<div class="section">
  <h2>Configuration</h2>
  <div class="well">
    <div class="grid">
      <div>
        <h3 class="sub">Output Gain (post-AGC)</h3>
        <div class="config-row"><label>D-Star Output</label><input type="range" min="-30" max="10" id="og_dstar"><span class="val" id="v_og_dstar">0</span></div>
        <div class="config-row"><label>M17 Output</label><input type="range" min="-30" max="10" id="og_m17"><span class="val" id="v_og_m17">0</span></div>
        <div class="config-row"><label>DMR/YSF Output</label><input type="range" min="-30" max="10" id="og_dmr"><span class="val" id="v_og_dmr">0</span></div>
        <div class="config-row"><label>P25/NXDN Output</label><input type="range" min="-30" max="10" id="og_imbe"><span class="val" id="v_og_imbe">0</span></div>
        <div class="config-row"><label>USRP/SVX Output</label><input type="range" min="-30" max="10" id="og_usrp"><span class="val" id="v_og_usrp">0</span></div>
        <h3 class="sub">DVSI Hardware</h3>
        <div class="config-row"><label>D-Star DVSI In</label><input type="range" min="-40" max="40" id="g_dstar_in"><span class="val" id="v_dstar_in">0</span></div>
        <div class="config-row"><label>D-Star DVSI Out</label><input type="range" min="-40" max="40" id="g_dstar_out"><span class="val" id="v_dstar_out">0</span></div>
        <div class="config-row"><label>DMR DVSI In</label><input type="range" min="-40" max="40" id="g_dmr_in"><span class="val" id="v_dmr_in">0</span></div>
        <div class="config-row"><label>DMR DVSI Out</label><input type="range" min="-40" max="40" id="g_dmr_out"><span class="val" id="v_dmr_out">0</span></div>
        <h3 class="sub">USRP / SVX</h3>
        <div class="config-row"><label>USRP Receive</label><input type="range" min="-40" max="40" id="g_usrp_rx"><span class="val" id="v_usrp_rx">0</span></div>
        <div class="config-row"><label>USRP Transmit</label><input type="range" min="-40" max="40" id="g_usrp_tx"><span class="val" id="v_usrp_tx">0</span></div>
        <h3 class="sub">DMR/YSF Gain</h3>
        <div class="config-row"><label>Mode</label><select id="dmr_gain_mode" style="flex:1;max-width:200px">
          <option value="off">Off</option>
          <option value="ambe">Bitstream (b2)</option>
          <option value="reencode">Re-encode (MD380)</option>
        </select></div>
        <div id="dmr_gain_ambe" style="display:none">
          <div class="config-row"><label>Bitstream Gain</label><input type="range" min="-30" max="0" id="ambe_gain_db"><span class="val" id="v_ambe_gain_db">-2</span></div>
        </div>
        <div id="dmr_gain_reencode" style="display:none">
          <div class="config-row"><label>Re-enc Gain</label><input type="range" min="-40" max="40" id="g_dmr_reencode"><span class="val" id="v_dmr_reencode">0</span></div>
        </div>
      </div>
      <div>
        <h3 class="sub">AGC</h3>
        <div class="config-row"><label>Enabled</label><input type="checkbox" id="agc_en"></div>
        <div class="config-row"><label>Target (dBFS)</label><input type="range" min="-40" max="0" id="agc_target"><span class="val" id="v_agc_target">-16</span></div>
        <div class="config-row"><label>Attack (ms)</label><input type="range" min="5" max="200" id="agc_attack"><span class="val" id="v_agc_attack">50</span></div>
        <div class="config-row"><label>Release (ms)</label><input type="range" min="50" max="2000" id="agc_release"><span class="val" id="v_agc_release">500</span></div>
        <div class="config-row"><label>Max Gain Up (dB)</label><input type="range" min="1" max="40" id="agc_maxgain_up"><span class="val" id="v_agc_maxgain_up">20</span></div>
        <div class="config-row"><label>Max Gain Down (dB)</label><input type="range" min="1" max="40" id="agc_maxgain_down"><span class="val" id="v_agc_maxgain_down">24</span></div>
      </div>
    </div>
    <div style="margin-top:12px;text-align:right">
      <button class="btn btn-sm" id="btn_save" onclick="saveConfig()">Save to INI</button>
      <span id="save_status" class="save-status"></span>
    </div>
  </div>
</div>

<div class="footer">TCD Monitor &mdash; Hybrid Transcoder Dashboard</div>

<script>
let ws, data = null, configLoaded = false;

function connect() {
  const loc = window.location;
  const url = 'ws://' + loc.hostname + ':' + loc.port + '/ws';
  ws = new WebSocket(url);
  ws.onopen = () => { document.getElementById('conn').className = 'conn ok'; document.getElementById('conn').textContent = 'connected'; };
  ws.onclose = () => { document.getElementById('conn').className = 'conn err'; document.getElementById('conn').textContent = 'disconnected'; setTimeout(connect, 2000); };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    data = JSON.parse(e.data);
    if (!configLoaded) {
      loadConfig(data.config);
      if (!(data.md380 && data.md380.available))
        document.querySelector('#dmr_gain_mode option[value="reencode"]').remove();
      updateDmrGainMode();
      configLoaded = true;
    }
    render();
  };
}

function dbToWidth(db) {
  // -100 dBFS = 0%, 0 dBFS = 100%
  return Math.max(0, Math.min(100, (db + 60) / 60 * 100));
}

function vuColor(db) {
  if (db > -6) return 'red';
  if (db > -18) return 'yellow';
  return 'green';
}

function vuBar(label, rms, peak) {
  const w = dbToWidth(rms);
  const pw = dbToWidth(peak);
  return `<div class="vu-row">
    <span class="vu-label">${label}</span>
    <div class="vu-bar-bg">
      <div class="vu-bar ${vuColor(rms)}" style="width:${w}%"></div>
      <div class="vu-peak" style="left:${pw}%"></div>
    </div>
    <span class="vu-val">${rms > -99 ? rms.toFixed(1) : '-inf'} dB</span>
  </div>`;
}

function flowDiagram(mod, m, cfg) {
  const codec = m.codec_in;
  if (codec === 'none') return '<div class="flow empty">idle</div>';
  const cl = codec.toLowerCase();

  const ri = m.rms_in, ro = m.rms_out;
  const riStr = ri > -99 ? (ri.toFixed(0) + 'dB').padStart(6) : '  -inf';
  const roStr = ro > -99 ? (ro.toFixed(0) + 'dB').padStart(6) : '  -inf';

  // Determine gain for this codec direction
  let gainIn = 0, gainLabel = '';
  if (cl.includes('star')) { gainIn = cfg.gain_dstar_in; gainLabel = 'DStarIn'; }
  else if (cl.includes('dmr')) { gainIn = cfg.gain_dmr_in; gainLabel = 'DmrIn'; }
  else if (cl === 'usrp') { gainIn = cfg.gain_usrp_rx; gainLabel = 'UsrpRx'; }
  else if (cl === 'svx') { gainLabel = 'SVX'; }
  else if (cl.includes('p25')) { gainLabel = codec; }
  else if (cl.includes('codec2')) { gainLabel = codec; }

  const agcVal = (m.agc_gain >= 0 ? '+' : '') + m.agc_gain.toFixed(1);
  const agcStr = cfg.agc_enabled ? (m.agc_gate ? 'AGC GATE' : `AGC ${agcVal.padStart(6)}dB`) : 'no AGC';
  const gateStr = '';

  // Build output targets
  let targets = [];
  if (!cl.includes('star')) targets.push('D-Star');
  if (!cl.includes('dmr')) targets.push('DMR/YSF');
  if (!cl.includes('codec2')) targets.push('M17');
  if (!cl.includes('p25')) targets.push('P25/NXDN');
  if (cl !== 'usrp') targets.push('USRP');
  if (cl !== 'svx') targets.push('SVX');

  return `<div class="flow">
    <div class="flow-row">
      <span class="flow-node flow-src">${codec}</span>
      <span class="flow-arrow">&rarr;</span>
      ${gainIn !== 0 ? `<span class="flow-node flow-gain">${gainLabel} ${gainIn > 0 ? '+' : ''}${gainIn}dB</span><span class="flow-arrow">&rarr;</span>` : ''}
      <span class="flow-node flow-pcm">PCM <span class="flow-level">${riStr}</span></span>
      <span class="flow-arrow">&rarr;</span>
      <span class="flow-node flow-agc">${agcStr}${gateStr}</span>
      <span class="flow-arrow">&rarr;</span>
      <span class="flow-node flow-pcm">PCM <span class="flow-level">${roStr}</span></span>
      <span class="flow-arrow">&rarr;</span>
      <span class="flow-node flow-dst">${targets.join(', ')}</span>
    </div>
  </div>`;
}

function render() {
  if (!data) return;

  let html = '<div class="grid">';
  for (const [mod, m] of Object.entries(data.modules)) {
    const active = m.codec_in !== 'none' && m.idle < 2;
    html += `<div class="panel ${active ? 'active' : ''}">
      <div class="module-header">
        <span class="module-letter">Module ${mod}</span>
        <span class="codec-badge ${m.codec_in === 'none' ? 'none' : ''}">${m.codec_in}</span>
      </div>
      ${flowDiagram(mod, m, data.config)}
      ${vuBar('Pre-AGC', m.rms_in, m.peak_in)}
      ${vuBar('Post-AGC', m.rms_out, m.peak_out)}
      <div class="agc-info">
        <span class="agc-item">AGC: <span>${data.config.agc_enabled ? (m.agc_gate ? 'Gate' : ((m.agc_gain >= 0 ? '+' : '') + m.agc_gain.toFixed(1)).padStart(5, '\u2007') + '\u2007dB') : 'off'}</span></span>
        <span class="agc-item">Pkts: <span>${m.pkts_in}</span> in / <span>${m.pkts_out}</span> out</span>
      </div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('modules').innerHTML = html;

  // Devices table
  let rows = '';
  for (const d of data.devices) {
    const activeChs = d.channels ? d.channels.filter(c => c.module).length : 0;
    const totalChs = d.type === 'DV3003' ? 3 : 1;
    const dotClass = !d.online ? 'offline' : activeChs > 0 ? 'active' : 'online';
    const statusLabel = !d.online ? 'offline' : activeChs > 0 ? 'active' : 'idle';
    let modList = '';
    if (d.channels) {
      const mods = d.channels.filter(c => c.module).map(c => c.module);
      if (mods.length > 0) modList = `<span class="mod-tag">${mods.join(', ')}</span>`;
    }
    rows += `<tr>
      <td><span class="dot ${dotClass}"></span>${statusLabel}</td>
      <td class="serial">${d.serial}</td>
      <td>${d.type}</td>
      <td>${d.role || '-'}</td>
      <td class="num">${activeChs}/${totalChs}</td>
      <td class="num">${d.buf_depth}</td>
      <td>${modList || '<span class="muted">-</span>'}</td>
      <td class="num">${d.errors > 0 ? `<span class="err-tag">${d.errors}</span>` : '0'}</td>
    </tr>`;
  }
  // md380 software vocoder
  if (data.md380 && data.md380.available) {
    const m = data.md380;
    const isActive = m.active_module && m.active_module.length > 0;
    const dotClass = isActive ? 'active' : 'online';
    const statusLabel = isActive ? 'active' : 'idle';
    rows += `<tr>
      <td><span class="dot ${dotClass}"></span>${statusLabel}</td>
      <td class="serial">MD380</td>
      <td>Software</td>
      <td>dmr</td>
      <td class="num">${m.reencode_active ? 'ON' : 'off'}</td>
      <td class="num">${m.cached_streams}</td>
      <td>${isActive ? `<span class="mod-tag">${m.active_module}</span>` : '<span class="muted">-</span>'}</td>
      <td class="muted">enc:${m.encodes} dec:${m.decodes} re:${m.reencodes}</td>
    </tr>`;
  }
  document.getElementById('devices').innerHTML = rows
    ? `<table class="tcd"><thead><tr>
         <th>Status</th><th>Serial</th><th>Type</th><th>Role</th>
         <th class="num">Slots</th><th class="num">Buf</th><th>Active</th><th class="num">Errors</th>
       </tr></thead><tbody>${rows}</tbody></table>`
    : '<div class="empty">no devices</div>';

  // Reflector table
  const r = data.reflector;
  document.getElementById('reflector').innerHTML = `<table class="tcd"><thead><tr>
      <th>Status</th><th class="num">Packets RX</th><th class="num">Packets TX</th>
    </tr></thead><tbody><tr>
      <td><span class="dot ${r.connected ? 'ok' : 'err'}"></span>${r.connected ? 'Connected' : 'Disconnected'}</td>
      <td class="num">${r.pkts_rx}</td>
      <td class="num">${r.pkts_tx}</td>
    </tr></tbody></table>`;
}

// Config sliders
const gainKeys = ['dstar_in','dstar_out','dmr_in','dmr_out','usrp_rx','usrp_tx','dmr_reencode'];
const outgainKeys = ['outgain_dstar','outgain_m17','outgain_dmr','outgain_imbe','outgain_usrp'];

function loadConfig(cfg) {
  gainKeys.forEach(k => {
    const el = document.getElementById('g_' + k);
    if (el) { el.value = cfg['gain_' + k]; document.getElementById('v_' + k).textContent = cfg['gain_' + k]; }
  });
  outgainKeys.forEach(k => {
    const short_k = k.replace('outgain_','');
    const el = document.getElementById('og_' + short_k);
    if (el && cfg[k] !== undefined) { el.value = cfg[k]; document.getElementById('v_og_' + short_k).textContent = cfg[k]; }
  });
  // DMR gain mode dropdown (0=off, 1=ambe, 2=reencode)
  const modeMap = ['off', 'ambe', 'reencode'];
  document.getElementById('dmr_gain_mode').value = modeMap[cfg.dmr_gain_mode] || 'off';
  document.getElementById('ambe_gain_db').value = cfg.ambe_gain_db;
  document.getElementById('v_ambe_gain_db').textContent = cfg.ambe_gain_db;
  document.getElementById('agc_en').checked = cfg.agc_enabled;
  document.getElementById('agc_target').value = cfg.agc_target;
  document.getElementById('v_agc_target').textContent = cfg.agc_target;
  document.getElementById('agc_attack').value = cfg.agc_attack;
  document.getElementById('v_agc_attack').textContent = cfg.agc_attack;
  document.getElementById('agc_release').value = cfg.agc_release;
  document.getElementById('v_agc_release').textContent = cfg.agc_release;
  document.getElementById('agc_maxgain_up').value = cfg.agc_maxgain_up;
  document.getElementById('v_agc_maxgain_up').textContent = cfg.agc_maxgain_up;
  document.getElementById('agc_maxgain_down').value = cfg.agc_maxgain_down;
  document.getElementById('v_agc_maxgain_down').textContent = cfg.agc_maxgain_down;
}

// Send gain changes
gainKeys.forEach(k => {
  const el = document.getElementById('g_' + k);
  if (!el) return;
  el.addEventListener('input', () => {
    document.getElementById('v_' + k).textContent = el.value;
    fetch('/api/gain', { method: 'POST', body: JSON.stringify({ type: k, db: parseInt(el.value) }) });
  });
});

// Send output gain changes
outgainKeys.forEach(k => {
  const short_k = k.replace('outgain_','');
  const el = document.getElementById('og_' + short_k);
  if (!el) return;
  el.addEventListener('input', () => {
    document.getElementById('v_og_' + short_k).textContent = el.value;
    fetch('/api/gain', { method: 'POST', body: JSON.stringify({ type: k, db: parseInt(el.value) }) });
  });
});

// Send AGC changes
['agc_target','agc_attack','agc_release','agc_maxgain_up','agc_maxgain_down'].forEach(k => {
  const el = document.getElementById(k);
  if (!el) return;
  el.addEventListener('input', () => {
    document.getElementById('v_' + k).textContent = el.value;
    const key = k.replace('agc_', '');
    fetch('/api/agc', { method: 'POST', body: JSON.stringify({ [key]: parseFloat(el.value) }) });
  });
});

document.getElementById('agc_en').addEventListener('change', (e) => {
  fetch('/api/agc', { method: 'POST', body: JSON.stringify({ enabled: e.target.checked }) });
});

document.getElementById('dmr_gain_mode').addEventListener('change', (e) => {
  const modeInt = {off: 0, ambe: 1, reencode: 2}[e.target.value] || 0;
  fetch('/api/agc', { method: 'POST', body: JSON.stringify({ dmr_gain_mode: modeInt }) });
  updateDmrGainMode();
});

document.getElementById('ambe_gain_db').addEventListener('input', (e) => {
  const db = parseInt(e.target.value);
  document.getElementById('v_ambe_gain_db').textContent = db;
  fetch('/api/agc', { method: 'POST', body: JSON.stringify({ ambe_gain_db: db }) });
});

function updateDmrGainMode() {
  const mode = document.getElementById('dmr_gain_mode').value;
  document.getElementById('dmr_gain_ambe').style.display = mode === 'ambe' ? '' : 'none';
  document.getElementById('dmr_gain_reencode').style.display = mode === 'reencode' ? '' : 'none';
}

function saveConfig() {
  document.getElementById('save_status').textContent = 'saving...';
  fetch('/api/save', { method: 'POST' })
    .then(r => r.json())
    .then(j => { document.getElementById('save_status').textContent = j.status === 'ok' ? 'saved!' : j.message; })
    .catch(() => { document.getElementById('save_status').textContent = 'error'; });
  setTimeout(() => document.getElementById('save_status').textContent = '', 3000);
}

connect();
</script>
</body>
</html>
